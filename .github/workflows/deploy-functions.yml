name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'taalaam/supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy process-content function
        run: |
          supabase functions deploy process-content \
            --project-ref xborpnxbdvstiabtevix \
            --no-verify-jwt
        working-directory: taalaam
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
