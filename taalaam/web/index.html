<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="taalaam">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Ta'allam — تعلَّم</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #flutter-loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f5f0e8;
      font-family: sans-serif;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #flutter-loading.fade-out { opacity: 0; pointer-events: none; }
    #flutter-loading .arabic {
      font-size: 56px; color: #1b4332; margin-bottom: 12px;
    }
    #flutter-loading .spinner {
      width: 36px; height: 36px; margin-top: 24px;
      border: 3px solid #d4a01733;
      border-top-color: #d4a017;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!--
    Fix for Flutter dev server serving .wasm files as text/plain.
    Chrome 91+ rejects WebAssembly.compileStreaming with wrong MIME type.
    This patch falls back to compile-from-buffer so all WASM loads correctly.
  -->
  <script>
    (function () {
      const _orig = WebAssembly.compileStreaming;
      WebAssembly.compileStreaming = async function (responsePromise) {
        const response = await responsePromise;
        const ct = response.headers.get('content-type') || '';
        if (ct.includes('application/wasm')) {
          return _orig.call(WebAssembly, Promise.resolve(response));
        }
        // Wrong MIME type — fall back to array-buffer compile (no streaming)
        const buffer = await response.arrayBuffer();
        return WebAssembly.compile(buffer);
      };
      const _origInst = WebAssembly.instantiateStreaming;
      WebAssembly.instantiateStreaming = async function (responsePromise, imports) {
        const response = await responsePromise;
        const ct = response.headers.get('content-type') || '';
        if (ct.includes('application/wasm')) {
          return _origInst.call(WebAssembly, Promise.resolve(response), imports);
        }
        const buffer = await response.arrayBuffer();
        return WebAssembly.instantiate(buffer, imports);
      };
    })();
  </script>

  <!-- sql.js required by drift WebDatabase for local SQLite on web -->
  <!-- Loaded from CDN so it works in both flutter run (dev server) and prod -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
</head>
<body>
  <div id="flutter-loading">
    <div class="arabic">تعلَّم</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Remove loading overlay once Flutter renders its first frame
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('flutter-loading');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { el.remove(); }, 500);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
